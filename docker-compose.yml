services:

  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"

  user-service:
    build: ./user-service
    restart: on-failure
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JAVA_TOOL_OPTIONS=-Djava.net.preferIPv4Stack=false -Djava.net.preferIPv6Addresses=true
    dns:
      - 8.8.8.8
      - 1.1.1.1

  gateway-service:
    build: ./gateway-service
    restart: on-failure
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server

  appointment-service:
    build: ./appointment-service
    restart: on-failure
    ports:
      - "8083:8083"
    depends_on:
      - eureka-server
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JAVA_TOOL_OPTIONS=-Djava.net.preferIPv4Stack=false -Djava.net.preferIPv6Addresses=true
    dns:
      - 8.8.8.8
      - 1.1.1.1

  auth-service:
    build: ./auth-service
    restart: on-failure
    ports:
      - "8084:8084"
    depends_on:
      - eureka-server
    environment:
      - JWT_SECRET=${JWT_SECRET}

  bff-service:
    build: ./bff-service
    restart: on-failure
    ports:
      - "8085:8085"
    depends_on:
      - eureka-server
      - gateway-service
    environment:
      - JWT_SECRET=${JWT_SECRET}