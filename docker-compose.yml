services:
  

  eureka-server:
    build: ./eureka-server
    
    ports:
      - "8761:8761"

  user-service:
    build: ./user-service
    restart: on-failure
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
  
  gateway-service:
    build: ./gateway-service
    restart: on-failure
    ports:
      - "8082:8082"
    depends_on: 
      - eureka-server

  appointment-service:
    build: ./appointment-service
    restart: on-failure
    ports:
      - "8083:8083"
    depends_on:
      - eureka-server

  auth-service:
    build: ./auth-service
    restart: on-failure
    ports:
      - "8084:8084"
    depends_on:
      - eureka-server